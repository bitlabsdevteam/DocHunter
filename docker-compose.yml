version: '3.9'
services:
  web:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
    command: sh scripts/dev-web.sh
    ports:
      - "5173:5173"
  api:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
    command: sh scripts/dev-api.sh
    ports:
      - "3000:3000"
